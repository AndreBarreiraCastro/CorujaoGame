<div class="page-container">
  
  <div class="card-container">
    <mat-toolbar  class="toolbar-title">
      Cadastro de Usuario
    </mat-toolbar>

    <mat-card>
      <mat-card-content>
        <form [formGroup]="formGroup" class="form-container">
          <mat-form-field appearance="fill" class="full-width-input">
            <mat-label>Nome</mat-label>
            <input matInput type="text" formControlName="nome">
            <mat-error *ngIf="formGroup.get('nome') && 
                              formGroup.get('nome')?.invalid &&
                              formGroup.get('nome')?.touched">
              O nome é obrigatório.
            </mat-error>
          </mat-form-field>
          <mat-form-field appearance="fill"  class="full-width-input">
            <mat-label>CPF</mat-label>
            <input matInput type="text" mask="000.000.000-00" formControlName="cpf">
            <mat-error *ngIf="formGroup.get('cpf') && 
                              formGroup.get('cpf')?.invalid &&
                              formGroup.get('cpf')?.touched">
              O CPF é obrigatório.
            </mat-error>
          </mat-form-field>

          <mat-form-field appearance="fill" class="full-width-input">
            <mat-label>Sobrenome</mat-label>
            <input matInput type="text" formControlName="sobrenome">
            <mat-error *ngIf="formGroup.get('sobrenome') && 
                              formGroup.get('sobrenome')?.invalid &&
                              formGroup.get('sobrenome')?.touched">
              O sobrenome é obrigatório.
            </mat-error>
          </mat-form-field>
          
          <mat-form-field appearance="fill" class="full-width-input">
            <mat-label>Telefone+DD</mat-label>
            <input matInput type="text" formControlName="telefone"[value]="formGroup.get('telefone')?.value | telefone"
     >
            <mat-error *ngIf="formGroup.get('telefone') && 
                              formGroup.get('telefone')?.invalid &&
                              formGroup.get('telefone')?.touched">
              O telefone é obrigatório.
            </mat-error>
          </mat-form-field>
          
          <mat-form-field appearance="fill" class="full-width-input">
            <mat-label>Email</mat-label>
            <input matInput type="text" formControlName="email">
            <mat-error *ngIf="formGroup.get('email') && 
                              formGroup.get('email')?.invalid &&
                              formGroup.get('email')?.touched">
              O email é obrigatório.
            </mat-error>
          </mat-form-field>
          
          <!-- <mat-form-field appearance="fill" class="full-width-input">
            <mat-label>Perfil</mat-label>
            <input matInput type="text" formControlName="perfilUsuario">
            <mat-error *ngIf="formGroup.get('perfilUsuario') && 
                              formGroup.get('perfilUsuario')?.invalid &&
                              formGroup.get('perfilUsuario')?.touched">
              O perfil é obrigatório.
            </mat-error>
          </mat-form-field> -->
         <mat-form-field appearance="fill" class="full-width-input">
  <mat-label>Perfil</mat-label>

  <mat-select formControlName="idperfilUsuario">
    <mat-option *ngFor="let perfil of perfis" [value]="perfil">
      {{ perfil.label }}
    </mat-option>
  </mat-select>

  <mat-error *ngIf="formGroup.get('idperfilUsuario')?.invalid && formGroup.get('idperfilUsuario')?.touched">
    O perfil é obrigatório.
  </mat-error>
</mat-form-field>


        </form>
      </mat-card-content>

      <mat-card-actions>
        <button 
          mat-raised-button 
          color="primary" 
          (click)="salvar()"
          [disabled]="formGroup.invalid">
          Salvar
        </button>
       <button 
  mat-raised-button 
  color="primary" 
  [routerLink]="'/usuarios'">
  Voltar
</button>

      </mat-card-actions>
    </mat-card>
  </div>
</div>
